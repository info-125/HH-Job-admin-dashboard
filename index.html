<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ใบสมัครงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1814;
    --muted: #7A756E;
    --hint: #B0AA9F;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --danger: #C0392B;
    --danger-light: #FDF2F1;
    --warning-light: #FFF8E1;
    --warning: #F57F17;
    --radius: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 220px;
    height: 100vh;
    background: var(--text);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,.1);
    margin-bottom: 8px;
  }
  .sidebar-logo .dot {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-logo .dot svg { width: 18px; height: 18px; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: #fff; }
  .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,.4); display: block; margin-top: 1px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    transition: background .15s, color .15s;
    text-decoration: none;
  }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .badge-count {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* Main */
  .main {
    margin-left: 220px;
    padding: 2rem;
    min-height: 100vh;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-header h1 { font-size: 22px; font-weight: 600; }
  .page-header p { font-size: 13px; color: var(--muted); margin-top: 3px; }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 600; }
  .stat-val.green { color: var(--accent); }
  .stat-val.orange { color: var(--warning); }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .toolbar input, .toolbar select {
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    outline: none;
    color: var(--text);
    transition: border-color .2s;
  }
  .toolbar input { flex: 1; min-width: 180px; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: background .15s;
    color: var(--text);
  }
  .btn:hover { background: var(--bg); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger-light); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: .9; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg);
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAF8; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .name-cell strong { font-weight: 500; display: block; }
  .name-cell small { font-size: 12px; color: var(--muted); }

  .status-pill {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .s-pending { background: var(--warning-light); color: var(--warning); }
  .s-review  { background: #E3F2FD; color: #1565C0; }
  .s-pass    { background: var(--accent-light); color: var(--accent); }
  .s-reject  { background: var(--danger-light); color: var(--danger); }

  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 14px;
    transition: background .1s, color .1s;
  }
  .action-btn:hover { background: var(--bg); color: var(--text); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2rem;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 18px; font-weight: 600; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .detail-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { width: 140px; flex-shrink: 0; color: var(--muted); }
  .detail-val { flex: 1; font-weight: 500; word-break: break-all; }
  .about-box { background: var(--bg); border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.7; margin-top: 4px; color: var(--text); }

  .status-select {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }

  /* Loading */
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 15px; }

  @media(max-width:900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
  @media(max-width:600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="dot">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
    </div>
    <div>
      <span>HR Admin</span>
      <small>ระบบจัดการใบสมัคร</small>
    </div>
  </div>

  <a class="nav-item active" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    ภาพรวม
  </a>
  <a class="nav-item" href="#" onclick="filterStatus('')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    ใบสมัครทั้งหมด
    <span class="badge-count" id="totalBadge">0</span>
  </a>
  <a class="nav-item" href="#" onclick="filterStatus('รอพิจารณา')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    รอพิจารณา
  </a>
  <a class="nav-item" href="#" onclick="filterStatus('ผ่านการคัดเลือก')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    ผ่านการคัดเลือก
  </a>
</div>

<!-- Main -->
<div class="main">
  <div class="page-header">
    <div>
      <h1>ใบสมัครงาน</h1>
      <p id="lastUpdate">กำลังโหลดข้อมูล...</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="loadData()">↺ รีเฟรช</button>
      <button class="btn danger" onclick="clearAll()">🗑 ล้างข้อมูลทั้งหมด</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">ใบสมัครทั้งหมด</div>
      <div class="stat-val" id="statTotal">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">รอพิจารณา</div>
      <div class="stat-val orange" id="statPending">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ผ่านการคัดเลือก</div>
      <div class="stat-val green" id="statPass">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">วันนี้</div>
      <div class="stat-val" id="statToday">–</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  ค้นหาชื่อ อีเมล ตำแหน่ง..." oninput="renderTable()">
    <select id="filterPos" onchange="renderTable()">
      <option value="">ทุกตำแหน่ง</option>
    </select>
    <select id="filterStat" onchange="renderTable()">
      <option value="">ทุกสถานะ</option>
      <option>รอพิจารณา</option>
      <option>อยู่ระหว่างพิจารณา</option>
      <option>ผ่านการคัดเลือก</option>
      <option>ไม่ผ่านการคัดเลือก</option>
    </select>
    <button class="btn primary" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap">
    <div class="loading">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle">รายละเอียดใบสมัคร</h2>
      <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
var STORAGE_KEY = 'job_applications';
var allApps = [];
var currentFilter = '';

function statusClass(s) {
  if (!s || s === 'รอพิจารณา') return 's-pending';
  if (s === 'อยู่ระหว่างพิจารณา') return 's-review';
  if (s === 'ผ่านการคัดเลือก') return 's-pass';
  return 's-reject';
}

function initials(fn, ln) {
  return ((fn||'')[0]||'') + ((ln||'')[0]||'');
}

function formatDate(iso) {
  if (!iso) return '–';
  var d = new Date(iso);
  return d.toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'});
}

async function loadData() {
  try {
    var result = await window.storage.get(STORAGE_KEY, true);
    allApps = result ? JSON.parse(result.value) : [];
  } catch(e) {
    allApps = [];
  }

  updateStats();
  populatePositionFilter();
  renderTable();

  var now = new Date();
  document.getElementById('lastUpdate').textContent =
    'อัปเดตล่าสุด: ' + now.toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('totalBadge').textContent = allApps.length;
}

function updateStats() {
  var today = new Date().toDateString();
  document.getElementById('statTotal').textContent = allApps.length;
  document.getElementById('statPending').textContent = allApps.filter(a => !a.status || a.status === 'รอพิจารณา').length;
  document.getElementById('statPass').textContent = allApps.filter(a => a.status === 'ผ่านการคัดเลือก').length;
  document.getElementById('statToday').textContent = allApps.filter(a => new Date(a.submittedAt).toDateString() === today).length;
}

function populatePositionFilter() {
  var sel = document.getElementById('filterPos');
  var positions = [...new Set(allApps.map(a => a.position).filter(Boolean))];
  sel.innerHTML = '<option value="">ทุกตำแหน่ง</option>' +
    positions.map(p => '<option>' + p + '</option>').join('');
}

function filterStatus(s) {
  document.getElementById('filterStat').value = s;
  renderTable();
}

function renderTable() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var pos = document.getElementById('filterPos').value;
  var stat = document.getElementById('filterStat').value;

  var filtered = allApps.filter(function(a) {
    var name = (a.fname + ' ' + a.lname).toLowerCase();
    var matchSearch = !search || name.includes(search) ||
      (a.email||'').toLowerCase().includes(search) ||
      (a.position||'').toLowerCase().includes(search) ||
      (a.ref||'').toLowerCase().includes(search);
    var matchPos = !pos || a.position === pos;
    var matchStat = !stat || a.status === stat;
    return matchSearch && matchPos && matchStat;
  });

  var wrap = document.getElementById('tableWrap');

  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><h3>ไม่พบข้อมูล</h3><p>' +
      (allApps.length === 0 ? 'ยังไม่มีใบสมัครเข้ามา' : 'ไม่มีผลลัพธ์ที่ตรงกับการค้นหา') + '</p></div>';
    return;
  }

  var rows = filtered.slice().reverse().map(function(a, i) {
    var realIdx = allApps.indexOf(a);
    return '<tr>' +
      '<td><div class="name-cell"><div class="avatar">' + initials(a.fname,a.lname) + '</div>' +
        '<div><strong>' + (a.fname||'') + ' ' + (a.lname||'') + '</strong>' +
        '<small>' + (a.lineId||a.email||'') + '</small></div></div></td>' +
      '<td>' + (a.position||'–') + '</td>' +
      '<td style="font-size:13px">' + ((a.branch||'–').replace('สาขา ','')) + '</td>' +
      '<td><select class="status-select" onchange="updateStatus(' + realIdx + ',this.value)">' +
        ['รอพิจารณา','อยู่ระหว่างพิจารณา','ผ่านการคัดเลือก','ไม่ผ่านการคัดเลือก']
          .map(function(s){ return '<option' + (a.status===s?' selected':'') + '>' + s + '</option>'; }).join('') +
        '</select></td>' +
      '<td style="font-size:12px;color:var(--muted)">' + formatDate(a.submittedAt) + '</td>' +
      '<td>' +
        '<button class="action-btn" title="ดูรายละเอียด" onclick="showDetail(' + realIdx + ')">👁</button>' +
        '<button class="action-btn danger" title="ลบ" onclick="deleteApp(' + realIdx + ')">🗑</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  wrap.innerHTML = '<table>' +
    '<thead><tr>' +
      '<th>ผู้สมัคร</th><th>ตำแหน่ง</th><th>สาขา</th><th>สถานะ</th><th>วันที่สมัคร</th><th></th>' +
    '</tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table>';
}

async function updateStatus(idx, val) {
  allApps[idx].status = val;
  await window.storage.set(STORAGE_KEY, JSON.stringify(allApps), true);
  updateStats();
}

async function deleteApp(idx) {
  if (!confirm('ต้องการลบใบสมัครของ ' + allApps[idx].fname + ' ' + allApps[idx].lname + ' ใช่ไหม?')) return;
  allApps.splice(idx, 1);
  await window.storage.set(STORAGE_KEY, JSON.stringify(allApps), true);
  updateStats();
  populatePositionFilter();
  renderTable();
  document.getElementById('totalBadge').textContent = allApps.length;
}

async function clearAll() {
  if (!confirm('ต้องการลบใบสมัครทั้งหมด ' + allApps.length + ' รายการ ใช่ไหม? ไม่สามารถกู้คืนได้')) return;
  allApps = [];
  await window.storage.set(STORAGE_KEY, JSON.stringify([]), true);
  updateStats();
  renderTable();
  document.getElementById('totalBadge').textContent = 0;
}

function showDetail(idx) {
  var a = allApps[idx];
  document.getElementById('modalTitle').textContent = a.fname + ' ' + a.lname;
  var fields = [
    ['รหัสอ้างอิง', a.ref||'–'],
    ['วันที่สมัคร', formatDate(a.submittedAt)],
    ['ID Line', a.lineId||a.email||'–'],
    ['โทรศัพท์', a.phone||'–'],
    ['ที่อยู่', a.address||'–'],
    ['ตำแหน่งที่สมัคร', a.position||'–'],
    ['สาขาที่ต้องการ', a.branch||'–'],
    ['เงินเดือนที่ต้องการ', a.salary ? a.salary + ' บาท' : '–'],
    ['ประสบการณ์', a.exp||'–'],
    ['วุฒิการศึกษา', a.edu||'–'],
    ['เอกสารที่ 1', a.resumeFile||'–'],
    ['เอกสารที่ 2', a.resumeFile2||'–'],
    ['สถานะ', '<span class="status-pill ' + statusClass(a.status) + '">' + (a.status||'รอพิจารณา') + '</span>'],
  ];
  var html = fields.map(function(f){
    return '<div class="detail-row"><div class="detail-label">' + f[0] + '</div><div class="detail-val">' + f[1] + '</div></div>';
  }).join('');
  if (a.about) {
    html += '<div class="detail-row"><div class="detail-label">แนะนำตัว</div><div class="detail-val"><div class="about-box">' + (a.about||'–') + '</div></div></div>';
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function exportCSV() {
  if (allApps.length === 0) { alert('ไม่มีข้อมูลที่จะ export'); return; }
  var headers = ['รหัสอ้างอิง','ชื่อ','นามสกุล','อีเมล','โทรศัพท์','ที่อยู่','ตำแหน่ง','เงินเดือน','ประสบการณ์','วุฒิ','Portfolio','สถานะ','วันที่สมัคร'];
  var rows = allApps.map(function(a) {
    return [a.ref,a.fname,a.lname,a.email,a.phone,a.address,a.position,a.salary,a.exp,a.edu,a.portfolio,a.status||'รอพิจารณา',a.submittedAt]
      .map(function(v){ return '"' + (v||'').replace(/"/g,'""') + '"'; }).join(',');
  });
  var csv = '\uFEFF' + [headers.join(',')].concat(rows).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'job_applications_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

// Initial load
loadData();
// Auto refresh every 30 sec
setInterval(loadData, 30000);
</script>
